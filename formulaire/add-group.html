<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fairpay - Créer un groupe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile-container">
        <div class="top-bar">
            <a href="javascript:history.back()" class="back-btn"><i class="bi bi-chevron-left"></i></a>
            <h4 class="fw-bold mb-0">Nouveau groupe</h4>
        </div>

        <div class="light-card">
            <form>
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold" style="font-size: 13px;">Nom du groupe</label>
                    <input type="text" class="form-control" placeholder="Ex: Voyage à Rome, Coloc..." required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label text-muted fw-bold" style="font-size: 13px;">Description (Optionnelle)</label>
                    <textarea class="form-control" rows="3" placeholder="Ex: Frais partagés pour notre week-end en Italie"></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted fw-bold" style="font-size: 13px;">Ajouter des membres</label>
                    <input type="email" class="form-control mb-2" placeholder="Adresse email du membre">
                    <button type="button" class="btn btn-outline-primary w-100" style="border-radius: 8px; font-weight: 500;">
                        <i class="bi bi-plus-circle me-2"></i> Ajouter cette personne
                    </button>
                </div>

                <button type="submit" class="btn btn-primary-custom mt-2">CRÉER LE GROUPE</button>
            </form>
        </div>
    </div>
</body>
</html>
