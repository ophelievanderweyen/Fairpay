3<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Fairpay - Ajouter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light p-4">
    <div class="container bg-white p-4 rounded-4 shadow-sm" style="max-width: 450px;">
        <h2 class="h5 fw-bold mb-4">Ajouter une dépense</h2>
        <form action="api/add_depense.php" method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">Motif</label>
                <input type="text" name="reason" class="form-control" placeholder="Ex: Restaurant" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">Montant (€)</label>
                <input type="number" name="amount" class="form-control" step="0.01" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">Payé par</label>
                <select name="payer_id" class="form-select">
                    <option value="1">Aurélie</option>
                    <option value="2">Dina</option>
                    <option value="3">Kawthar</option>
                </select>
            </div>
            <input type="hidden" name="group_id" value="1">
            <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold">VALIDER</button>
        </form>
    </div>
</body>
</html>
