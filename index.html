<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fairpay - Gestion de dépenses</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    
    <link rel="stylesheet" href="style.css"> 
    
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-light"> 

    <div id="app">

         
        


        <template>
  <template v-if="!currentUser">
    <div class="container-fluid p-0 vh-100 d-flex">

      <!-- PARTIE GAUCHE -->
      <div class="login-banner d-none d-md-flex flex-column justify-content-center align-items-center w-50">
        <div class="text-center text-white p-5">
          <h1 style="font-size: 3.5rem; font-weight: 800; letter-spacing: -1px;">Fairpay</h1>
          <p style="font-size: 1.2rem; opacity: 0.9; font-weight: 300;">
            Gérez vos dépenses de groupe en toute simplicité. Plus de disputes, juste des comptes justes.
          </p>
          <i class="bi bi-wallet2" style="font-size: 8rem; opacity: 0.2; margin-top: 30px; display: block;"></i>
        </div>
      </div>

      <!-- PARTIE DROITE -->
      <div class="w-100 w-md-50 d-flex justify-content-center align-items-center" style="background: var(--bg);">
        <div class="card p-5 shadow-sm border-0" style="width: 450px; background: var(--card);">

          <h3 class="text-center mb-4" style="font-weight: 600;">
            <span v-if="isLogin">Connexion</span>
            <span v-else>Créer un compte</span>
          </h3>

          <div v-if="error" class="alert alert-danger">{{ error }}</div>

          <!-- FORMULAIRE CONNEXION -->
          <form v-if="isLogin" @submit.prevent="login">
            <div class="mb-3">
              <label for="login_email" class="form-label text-muted small">Email</label>
              <input
                id="login_email"
                v-model="login_form.email"
                type="email"
                class="form-control"
                placeholder="nom@exemple.com"
                required
              >
            </div>

            <div class="mb-4">
              <label for="login_pass" class="form-label text-muted small">Mot de passe</label>
              <div class="input-group">
                <input
                  id="login_pass"
                  v-model="login_form.password"
                  :type="showPassword ? 'text' : 'password'"
                  class="form-control"
                  placeholder="••••••••"
                  required
                >
                <button
                  class="btn btn-outline-secondary"
                  type="button"
                  @click="showPassword = !showPassword"
                  style="border-color: var(--border); background: var(--bg); color: var(--text);"
                >
                  <i class="bi" :class="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">
              Se connecter
            </button>
          </form>

          <!-- FORMULAIRE INSCRIPTION -->
          <form v-else @submit.prevent="register">
            <div class="mb-3">
              <label for="register_user" class="form-label text-muted small">Nom d'utilisateur</label>
              <input
                id="register_user"
                v-model="register_form.username"
                class="form-control"
                placeholder="ex: alice"
                required
              >
            </div>

            <div class="mb-3">
              <label for="register_email" class="form-label text-muted small">Email</label>
              <input
                id="register_email"
                v-model="register_form.email"
                type="email"
                class="form-control"
                placeholder="nom@exemple.com"
                required
              >
            </div>

            <div class="mb-4">
              <label for="register_pass" class="form-label text-muted small">Mot de passe</label>
              <div class="input-group">
                <input
                  id="register_pass"
                  v-model="register_form.password"
                  :type="showPassword ? 'text' : 'password'"
                  class="form-control"
                  placeholder="••••••••"
                  required
                >
                <button
                  class="btn btn-outline-secondary"
                  type="button"
                  @click="showPassword = !showPassword"
                  style="border-color: var(--border); background: var(--bg); color: var(--text);"
                >
                  <i class="bi" :class="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
                </button>
              </div>
              <div class="form-text">Au moins 8 caractères.</div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">
              S'inscrire
            </button>
          </form>

          <!-- SWITCH -->
          <div class="text-center mt-4">
            <span class="text-muted" style="font-size: 0.9em;">
              <template v-if="isLogin">Pas encore de compte ?</template>
              <template v-else>Déjà un compte ?</template>
            </span>
            <br>
            <a href="#" class="auth-link" @click.prevent="toggleMode">
              <template v-if="isLogin">Créer un compte maintenant</template>
              <template v-else>Se connecter</template>
            </a>
          </div>

        </div>
      </div>
    </div>
  </template>
</template>

<script>
export default {
  name: "AuthPage",
  data() {
    return {
      isLogin: true,
      showPassword: false,
      error: "",
      currentUser: null,

      login_form: {
        email: "",
        password: "",
      },

      register_form: {
        username: "",
        email: "",
        password: "",
      },
    };
  },
  methods: {
    toggleMode() {
      this.isLogin = !this.isLogin;
      this.error = "";
      this.showPassword = false;
    },

    async login() {
      this.error = "";
      try {
        console.log("Login:", this.login_form);
      } catch (e) {
        this.error = "Erreur lors de la connexion.";
      }
    },

    async register() {
      this.error = "";
      try {
        console.log("Register:", this.register_form);
      } catch (e) {
        this.error = "Erreur lors de l'inscription.";
      }
    },
  },
};
</script>

<style scoped>
.login-banner {
  min-height: 100vh;
  background: linear-gradient(135deg, #6f42c1, #4f46e5);
}

.auth-link {
  text-decoration: none;
  font-weight: 600;
}

.auth-link:hover {
  text-decoration: underline;
}
</style>
